name: Build Mash-up Pack

on:
  push:
    branches: [ "main" ]
    paths:
      - 'resourcepacks/external/lce-resources/**'
      - 'packsquash.toml'
  workflow_dispatch:

jobs:
  build:
    runs-on: technocality
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
          sparse-checkout: |
            resourcepacks
            packsquash.toml

      - name: Setup PackSquash
        run: |
          mkdir -p $HOME/.local/bin
          if [ ! -f $HOME/.local/bin/packsquash ]; then
            curl -L "https://github.com/ComunidadAylas/PackSquash/releases/download/v0.4.1/packsquash-x86_64-unknown-linux-gnu.zip" -o ps.zip
            unzip -oj ps.zip -d $HOME/.local/bin/
            chmod +x $HOME/.local/bin/packsquash
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build
        id: build
        run: |
          pack=$(git diff --name-only HEAD^ HEAD \
            | grep '^resourcepacks/external/lce-resources/' \
            | sed 's|resourcepacks/external/lce-resources/\([^/]*\)/.*|\1|' \
            | sort -u | head -1)

          if [ -z "$pack" ]; then pack="halloween"; fi
          dir="./resourcepacks/external/lce-resources/$pack"
          echo "pack=$pack" >> $GITHUB_OUTPUT

          cat <<EOF > generated_packsquash.toml
          [options]
          pack_directory = '$dir'
          output_file_path = '$(pwd)/$pack.zip'
          minify_json = true
          recompress_compressed_files = true
          zip_compression_iterations = 5
          automatic_minecraft_quirks_detection = true

          ['**/*.{flac,wav}']
          ogg_obfuscation = true
          channels = 2
          sampling_frequency = 44100
          target_pitch = 1.5

          ['**/*.png']
          image_data_compression_iterations = 15
          png_obfuscation = true

          [[filters]]
          path = '**/1_20_2/**'
          action = 'copy'
          [[filters]]
          path = '**/1_21_2/**'
          action = 'copy'
          [[filters]]
          path = '**/1_21_6/**'
          action = 'copy'
          [[filters]]
          path = '**/1_21_9/**'
          action = 'copy'
          [[filters]]
          path = '**/background.png'
          action = 'copy'
          EOF

          packsquash generated_packsquash.toml

      - name: Upload
        uses: https://code.forgejo.org/actions/upload-artifact@v3
        with:
          name: ${{ steps.build.outputs.pack }}
          path: ${{ steps.build.outputs.pack }}.zip