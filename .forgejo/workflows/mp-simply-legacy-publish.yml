name: Publish Simply Legacy

on:
  push:
    tags:
      - 'SL-*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version'
        required: false
        type: string

jobs:
  build:
    runs-on: technocality
    strategy:
      matrix:
        include:
          - { version: "1.21.10-fabric", loader: "fabric", platform: "modrinth", file_ext: "mrpack", folder: "mr" }
          - { version: "1.21.10-fabric", loader: "fabric", platform: "curseforge", file_ext: "zip",  folder: "cf" }

    env:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
      PACK_NAME: "Simply-Legacy"
      OUTPUT: artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            modpacks/simply-legacy

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Cache Packwiz Binary
        id: cache-packwiz
        uses: https://code.forgejo.org/actions/cache@v3
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-packwiz-bin-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-packwiz-bin-

      - name: Install Packwiz
        run: |
          if [ ! -f "$HOME/go/bin/packwiz" ]; then
            go install github.com/packwiz/packwiz@latest
          fi
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Extract Version
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            VERSION=$(echo "${{ github.ref_name }}" | sed 's/^SL-//')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          if [[ "$VERSION" == *"-alpha"* ]]; then
            echo "is_alpha=true" >> $GITHUB_OUTPUT
          else
            echo "is_alpha=false" >> $GITHUB_OUTPUT
          fi

      - name: Build modpack
        run: |
          temp_dir="build-${{ matrix.platform }}-${{ matrix.version }}"
          mkdir -p "$temp_dir"
          cp -r ./modpacks/simply-legacy/${{ matrix.folder }}/yarn/${{ matrix.version }}/* "./$temp_dir/"
          cd "./$temp_dir/"
          
          packwiz refresh
          mkdir -p "../${{ env.OUTPUT }}"
          packwiz ${{ matrix.platform }} export --output "../${{ env.OUTPUT }}/${{ env.PACK_NAME }}-${{ matrix.version }}-${{ steps.vars.outputs.version }}-${{ matrix.platform }}.${{ matrix.file_ext }}"

      - name: Publish to Modrinth
        if: matrix.platform == 'modrinth' && steps.vars.outputs.is_alpha == 'false'
        uses: https://github.com/Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: "simply-legacy"
          modrinth-token: ${{ secrets.MR }}
          files: "${{ env.OUTPUT }}/${{ env.PACK_NAME }}-${{ matrix.version }}-${{ steps.vars.outputs.version }}-modrinth.mrpack"
          name: "${{ steps.vars.outputs.version }} (${{ matrix.version }})"
          version: "${{ steps.vars.outputs.version }}+mc${{ matrix.version }}"
          loaders: fabric
          game-versions: "1.21.10"
          fail-mode: warn

      - name: Publish to CurseForge
        if: matrix.platform == 'curseforge' && steps.vars.outputs.is_alpha == 'false'
        uses: https://github.com/Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: "simply-legacy"
          curseforge-token: ${{ secrets.CF }}
          files: "${{ env.OUTPUT }}/${{ env.PACK_NAME }}-${{ matrix.version }}-${{ steps.vars.outputs.version }}-curseforge.zip"
          name: "${{ steps.vars.outputs.version }} (${{ matrix.version }})"
          version: "${{ steps.vars.outputs.version }}+mc${{ matrix.version }}"
          loaders: fabric
          game-versions: "1.21.10"
          fail-mode: warn

      - name: Upload to Forgejo Release
        if: github.event_name == 'release' || github.event_name == 'push'
        run: |
          for f in ${{ env.OUTPUT }}/${{ env.PACK_NAME }}-${{ matrix.version }}*; do
            if [ -f "$f" ]; then
              FILE="$f"
              break
            fi
          done
          
          TAG_NAME="${{ github.ref_name }}"
          REL_ID=$(curl -s -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/tags/$TAG_NAME" \
            | grep -o '"id":[0-9]*' | head -1 | sed 's/"id"://')
          
          if [ -n "$REL_ID" ] && [ -n "$FILE" ]; then
            echo "Uploading $(basename "$FILE") to release $REL_ID"
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$FILE" \
              "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/${REL_ID}/assets?name=$(basename "$FILE")"
          else
            echo "Skipping"
          fi

      - name: Cleanup
        run: rm -rf ${{ env.OUTPUT }}
