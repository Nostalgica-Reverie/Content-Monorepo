name: Validate Resource Packs

on:
  push:
    branches: [ "main" ]
    paths:
      - 'resourcepacks/external/**'
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  validate:
    runs-on: technocality
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            resourcepacks/external
            rpv-config.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache ResourcePackValidator
        id: cache-rpv
        uses: actions/cache@v3
        with:
          path: ~/rpv.jar
          key: rpv-jar-v1

      - name: Build ResourcePackValidator
        if: steps.cache-rpv.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/MrKinau/ResourcePackValidator.git /tmp/rpv-src
          cd /tmp/rpv-src
          mvn package -q -DskipTests
          cp target/ResourcePackValidator*.jar ~/rpv.jar

      - name: Validate all
        run: |
          failed=0
          for dir in resourcepacks/external/*/; do
            [ -d "$dir" ] || continue
            
            echo "::group::Validating $(basename "$dir")"
            java -jar ~/rpv.jar -rp "$dir" -config rpv-config.json || failed=1
            echo "::endgroup::"
          done
          
          if [ $failed -ne 0 ]; then
            echo "Validation failed"
            exit 1
          fi