name: Validate Resource Packs
on:
  push:
    branches: [ "main" ]
    paths:
      - 'resourcepacks/**'
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
jobs:
  validate:
    runs-on: technocality
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install Java
        run: apt-get update && apt-get install -y openjdk-17-jre-headless

      - name: Validate all
        run: |
          failed=0
          for dir in ./resourcepacks/external/*/ ./resourcepacks/internal/*/; do
            pack=$(basename "$dir")
            echo "Validating $pack"
            docker run --rm -v "$(pwd)/$dir:/resourcepack" ghcr.io/mrkinau/resourcepackvalidator:master resourcepackvalidator -rp /resourcepack || failed=1
          done
          exit $failed