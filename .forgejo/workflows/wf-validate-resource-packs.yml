name: Validate Resource Packs
on:
  push:
    branches: [ "main" ]
    paths:
      - 'resourcepacks/**'
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
jobs:
  validate:
    runs-on: technocality
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install Java
        run: apt-get update && apt-get install -y openjdk-25-jre-headless

      - name: Validate all
        run: |
          curl -sL https://github.com/MrKinau/ResourcePackValidator/releases/latest/download/ResourcePackValidator.jar -o /tmp/rpv.jar
          failed=0
          for dir in ./resourcepacks/external/*/ ./resourcepacks/internal/*/; do
            pack=$(basename "$dir")
            echo "Validating $pack"
            java -jar /tmp/rpv.jar -rp "$dir" || failed=1
          done
          exit $failed