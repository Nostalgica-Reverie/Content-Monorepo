name: JSON linter
on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.json'
  pull_request:
    paths:
      - '**/*.json'

jobs:
  lint:
    runs-on: technocality
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            modpacks
      - name: Lint JSON
        run: |
          find . -name "*.json" | while read f; do
            python3 -m json.tool "$f" > /dev/null || echo "FAILED: $f"
          done