name: JSON linter
on:
  push:
    branches: [ "main" ]
    paths:
      - 'modpacks/**/*.json'
  pull_request:
    paths:
      - 'modpacks/**/*.json'
jobs:
  lint:
    runs-on: technocality
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            modpacks
      - name: Lint JSON
        run: |
          changed=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^modpacks/' \
            | sed 's|modpacks/\([^/]*\)/.*|\1|' \
            | sort -u)
          while IFS= read -r pack; do
            [ -z "$pack" ] && continue
            echo "Linting $pack..."
            find "./modpacks/$pack" -name "*.json" | while read f; do
              python3 -m json.tool "$f" > /dev/null || echo "FIX YO JSON: $f"
            done
          done <<< "$changed"