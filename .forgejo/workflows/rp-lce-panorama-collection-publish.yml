name: Publish LCE Panorama Collection

on:
  push:
    tags: ['LPC-*']
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version'
        type: string

jobs:
  publish:
    runs-on: technocality
    strategy:
      matrix:
        include:
          - subfolder: "build0016"
            display_suffix: "(Build 0016)"
          - subfolder: "build0054"
            display_suffix: "(Build 0054)"
          - subfolder: "tu5"
            display_suffix: "(TU5)"
          - subfolder: "tu7"
            display_suffix: "(TU7)"
          - subfolder: "tu12"
            display_suffix: "(TU12)"
          - subfolder: "tu20"
            display_suffix: "(TU20)"
          - subfolder: "tu31"
            display_suffix: "(TU31)"
          - subfolder: "tu46"
            display_suffix: "(TU46)"
          - subfolder: "tu69"
            display_suffix: "(TU69)"
    env:
      PACK: lce-panorama-collection
      OUT: built-resourcepacks
    steps:
      - name: Checkout RP only
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: resourcepacks

      - name: Prep Variables
        id: vars
        run: |
          RAW_REF="${{ github.ref_name }}"
          OVERRIDE="${{ github.event.inputs.version_override }}"
          
          if [ -n "$OVERRIDE" ]; then
            VER="$OVERRIDE"
          elif [[ "$RAW_REF" == LPC-* ]]; then
            VER="${RAW_REF#LPC-}"
          else
            VER="dev-$(date +%s)"
          fi
          
          ALPHA="false"
          [[ "$VER" == *"-alpha"* ]] && ALPHA="true"
          
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "alpha=$ALPHA" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Cache PackSquash
        id: cache-packsquash
        uses: https://github.com/actions/cache@v3
        with:
          path: /usr/local/bin/packsquash
          key: packsquash-${{ runner.os }}

      - name: Setup PackSquash
        if: steps.cache-packsquash.outputs.cache-hit != 'true'
        run: |
          curl -L https://github.com/ComunidadAylas/PackSquash/releases/latest/download/packsquash-linux-x86_64 -o /usr/local/bin/packsquash
          chmod +x /usr/local/bin/packsquash

      - name: Build
        run: |
          mkdir -p "$OUT"
          FILE="$OUT/$PACK-${{ matrix.subfolder }}-${{ steps.vars.outputs.ver }}.zip"
          printf "pack_directory='./resourcepacks/external/$PACK/${{ matrix.subfolder }}'\noutput_file_path='$FILE'" > opt.toml
          $HOME/.local/bin/packsquash opt.toml
          echo "zip=$FILE" >> $GITHUB_ENV

      - name: Publish to Platforms
        if: steps.vars.outputs.alpha == 'false'
        uses: https://github.com/Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: lce-panorama-collection
          curseforge-id: lce-panorama-collection
          modrinth-token: ${{ secrets.MR }}
          curseforge-token: ${{ secrets.CF }}
          files: ${{ env.zip }}
          name: "LCE Panorama Collection ${{ steps.vars.outputs.ver }} ${{ matrix.display_suffix }}"
          version: "${{ steps.vars.outputs.ver }}-${{ matrix.subfolder }}"
          version-type: ${{ contains(steps.vars.outputs.ver, 'beta') && 'beta' || 'release' }}
          loaders: minecraft
          game-versions: "1.20.1\n1.20.4\n1.21.1\n1.21.3\n1.21.4\n1.21.5\n1.21.8\n1.21.10"
          changelog: ${{ github.event.release.body || format('Dev build - {0}', steps.vars.outputs.sha) }}

      - name: Upload to Forgejo
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          REL_ID=$(curl -s -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" | grep -oP '"id":\s*\K\d+')
          curl -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" -H "Content-Type: application/zip" --data-binary @"${{ env.zip }}" "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/$REL_ID/assets?name=$(basename ${{ env.zip }})"