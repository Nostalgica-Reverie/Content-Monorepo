name: Publish Ore4J

on:
  push:
    tags: ['O4J-*']
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version'
        type: string

jobs:
  publish:
    runs-on: technocality
    env:
      PACK: ore4j
      OUT: built-resourcepacks
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: resourcepacks

      - name: Prep Variables
        id: vars
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ github.event.inputs.version_override }}"
          IS_ALPHA="false"
          
          if [ -z "$VERSION" ]; then
            if [[ "$TAG" =~ ^O4J- ]]; then
              VERSION="${TAG#O4J-}"
              [[ "$VERSION" == *"-alpha"* ]] && IS_ALPHA="true"
            else
              VERSION="dev-$(date +%s)"
            fi
          fi
          
          echo "ver=$VERSION" >> $GITHUB_OUTPUT
          echo "alpha=$IS_ALPHA" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup PackSquash
        run: |
          if ! command -v packsquash &> /dev/null; then
            curl -L https://github.com/ComunidadAylas/PackSquash/releases/latest/download/packsquash-linux-x86_64 -o /usr/local/bin/packsquash
            chmod +x /usr/local/bin/packsquash
          fi

      - name: Build
        run: |
          mkdir -p $OUT
          FILE="$OUT/$PACK-${{ steps.vars.outputs.ver }}.zip"
          echo -e "pack_directory = './resourcepacks/external/$PACK'\noutput_file_path = '$FILE'" > opt.toml
          packsquash opt.toml
          echo "zip=$FILE" >> $GITHUB_ENV

      - name: Publish to Stores
        if: steps.vars.outputs.alpha == 'false'
        uses: https://github.com/Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ore4j
          modrinth-token: ${{ secrets.MR }}
          curseforge-id: ore4j
          curseforge-token: ${{ secrets.CF }}
          files: ${{ env.zip }}
          name: "Ore4J ${{ steps.vars.outputs.ver }}"
          version: "${{ steps.vars.outputs.ver }}"
          version-type: ${{ contains(steps.vars.outputs.ver, 'beta') && 'beta' || 'release' }}
          loaders: minecraft
          game-versions: "1.20.1\n1.20.4\n1.21.1\n1.21.3\n1.21.4\n1.21.5\n1.21.8\n1.21.10"
          changelog: ${{ github.event.release.body || format('Dev build - {0}', steps.vars.outputs.sha) }}
          fail-mode: warn

      - name: Upload to Forgejo
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" | grep -oP '"id":\s*\K\d+')
          curl -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" -H "Content-Type: application/zip" --data-binary @"${{ env.zip }}" "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$(basename ${{ env.zip }})"