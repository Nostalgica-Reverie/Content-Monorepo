name: Publish Old UI for Legacy4J

on:
  push:
    tags: ['TU0-*']
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version'
        type: string

jobs:
  publish:
    runs-on: technocality
    strategy:
      matrix:
        include:
          - { sub: "vanilla-assets", suff: "(Vanilla Assets)" }
          - { sub: "no-vanilla-assets", suff: "(No Vanilla Assets)" }
    env:
      PACK: old-l4j-ui
      OUT: built-resourcepacks
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: resourcepacks

      - name: Prep Variables
        id: vars
        run: |
          RAW_REF="${{ github.ref_name }}"
          OVERRIDE="${{ github.event.inputs.version_override }}"

          if [ -n "$OVERRIDE" ]; then
            VER="$OVERRIDE"
          elif [[ "$RAW_REF" == TU0-* ]]; then
            VER="${RAW_REF#TU0-}"
          else
            VER="dev-$(date +%s)"
          fi

          ALPHA="false"
          [[ "$VER" == *"-alpha"* ]] && ALPHA="true"

          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "alpha=$ALPHA" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup PackSquash
        run: |
          mkdir -p $HOME/.local/bin
          curl -L "https://github.com/ComunidadAylas/PackSquash/releases/download/v0.4.1/packsquash-x86_64-unknown-linux-gnu.zip" -o ps.zip
          unzip -oj ps.zip -d $HOME/.local/bin/
          chmod +x $HOME/.local/bin/packsquash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          mkdir -p "$OUT"
          FILE="$OUT/$PACK-${{ matrix.sub }}-${{ steps.vars.outputs.ver }}.zip"
          printf "pack_directory='./resourcepacks/external/$PACK/${{ matrix.sub }}'\noutput_file_path='$FILE'" > opt.toml
          packsquash opt.toml
          echo "zip=$FILE" >> $GITHUB_ENV

      - name: Publish to Platforms
        if: steps.vars.outputs.alpha == 'false'
        uses: https://github.com/Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: old-ui-for-legacy4j
          modrinth-token: ${{ secrets.MR }}
          curseforge-id: old-ui-for-legacy4j
          curseforge-token: ${{ secrets.CF }}
          files: ${{ env.zip }}
          name: "Old L4J UI ${{ steps.vars.outputs.ver }} ${{ matrix.suff }}"
          version: "${{ steps.vars.outputs.ver }}-${{ matrix.sub }}"
          version-type: ${{ contains(steps.vars.outputs.ver, 'beta') && 'beta' || 'release' }}
          loaders: minecraft
          game-versions: "1.20.1\n1.20.4\n1.21.1\n1.21.3\n1.21.4\n1.21.5\n1.21.8\n1.21.10"
          changelog: ${{ github.event.release.body || format('Dev build - {0}', steps.vars.outputs.sha) }}

      - name: Upload to Forgejo
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          REL_ID=$(curl -s -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" | grep -oP '"id":\s*\K\d+')
          curl -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" -H "Content-Type: application/zip" --data-binary @"${{ env.zip }}" "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/$REL_ID/assets?name=$(basename ${{ env.zip }})"